name: TBS back-in-stock pings (hourly)

# WhatsApps customers when an out-of-stock item they asked about is back.
on:
  schedule:
    - cron: "50 * * * *" # hourly at :50
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Check back-in-stock interest
        run: |
          code=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
            -H "x-cron-key: ${{ secrets.CRON_SECRET }}" \
            "https://www.cookiedoh.co.id/api/cron/tbs-backinstock")
          echo "HTTP $code"; cat /tmp/resp.txt; echo
          test "$code" = "200"

name: Keep Supabase awake (holiday insurance)

# Belt-and-suspenders: a bare DB ping so the Supabase project never hits the
# free-tier "paused after ~7 days idle" state while the storefront is on holiday.
# Runs independently of the feature crons (28 pings before the 7-day threshold).
# TEMPORARY — remove after the Cloud SQL migration cuts over (Cloud SQL never pauses).
on:
  schedule:
    - cron: "15 */6 * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keep-awake
        run: |
          code=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
            -H "x-cron-key: ${{ secrets.CRON_SECRET }}" \
            "https://www.cookiedoh.co.id/api/cron/keep-awake")
          echo "HTTP $code"; cat /tmp/resp.txt; echo
          test "$code" = "200"
